<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard | JobHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            overflow: hidden; /* Dashboard එක ඇතුළේ scroll නොවී content එක විතරක් scroll වෙන්න */
        }

        .dashboard-wrapper {
            display: flex;
            height: 100vh;
        }

        /* --- Sidebar Styling --- */
        .dashboard-sidebar {
            width: 280px;
            background: #0f172a; /* Navy Blue background */
            color: white;
            padding: 2.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .logo-section {
            padding: 0 1rem;
            margin-bottom: 3rem;
        }

        .logo-section h3 {
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }

        /* --- Navigation Links --- */
        .nav-link {
            position: relative; /* Indicator එක පෙළගස්වන්න අවශ්‍යයි */
            color: #94a3b8;
            padding: 0.9rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .nav-link i {
            margin-right: 14px;
            font-size: 1.2rem;
        }

        /* 🔵 නිල් පාට Active/Hover Indicator එක (ඔයා එවපු පින්තූරේ විදිහට) */
        .nav-link::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0); /* මුලින් හීනියට තියෙන්නේ */
            width: 5px;
            height: 24px; /* ඉරේ උස */
            background-color: #3b82f6; /* Bright Blue */
            border-radius: 0 4px 4px 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        /* Hover & Active Effects */
        .nav-link:hover, .nav-link.active {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Hover හෝ Active වුණාම නිල් ඉර පෙන්වීම */
        .nav-link:hover::before, .nav-link.active::before {
            transform: translateY(-50%) scaleY(1);
            opacity: 1;
        }

        .nav-link.text-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        /* --- Main Content Area --- */
        .dashboard-content {
            flex: 1;
            height: 100vh;
            background-color: #f8fafc;
        }

        /* Iframe styling */
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        hr.opacity-10 {
            border-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="dashboard-sidebar shadow-lg">
        <div class="logo-section">
            <h3 class="text-white">
                <i class="bi bi-rocket-takeoff-fill me-2 text-primary"></i>JobHub
            </h3>
        </div>

        <nav class="nav flex-column flex-grow-1">
            <a class="nav-link active" onclick="loadPage('overview.html', this)">
                <i class="bi bi-grid-1x2"></i> Overview
            </a>
            <a class="nav-link" onclick="loadPage('create-company.html', this)">
                <i class="bi bi-building"></i> Company Profile
            </a>
            <a class="nav-link" onclick="loadPage('post-job.html', this)">
                <i class="bi bi-plus-square"></i> Post a Job
            </a>
            <a class="nav-link" onclick="loadPage('my-jobs.html', this)">
                <i class="bi bi-briefcase"></i> Manage Jobs
            </a>
            <a class="nav-link" onclick="loadPage('applicants.html', this)">
                <i class="bi bi-people"></i> Applicants
            </a>

            <div class="mt-auto">
                <hr class="my-4 opacity-10">
                <a class="nav-link text-danger" href="#" onclick="logout()">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </nav>
    </aside>

    <main class="dashboard-content">
        <iframe src="overview.html" id="content-frame"></iframe>
    </main>
</div>

<script>
    // පේජ් එක මාරු කිරීම සහ Sidebar එකේ Active පන්තිය මාරු කිරීම
    function loadPage(pageUrl, element) {
        // Iframe එකේ source එක වෙනස් කරනවා
        document.getElementById('content-frame').src = pageUrl;

        // කලින් තිබුණ Active ලින්ක් එක අයින් කරනවා
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
        });

        // දැන් ක්ලික් කරපු ලින්ක් එක Active කරනවා
        element.classList.add('active');
    }

    function logout() {
        if (confirm("Are you sure you want to sign out?")) {
            localStorage.clear();
            window.location.replace('login.html');
        }
    }

    // ආරම්භයේදී Token එක පරීක්ෂා කිරීම
    window.onload = function() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
