<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Company Profile | JobHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .dashboard-wrapper { display: flex; min-height: 100vh; }

        /* Sidebar */
        .dashboard-sidebar {
            width: 280px;
            background: #0f172a;
            color: white;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
        }

        .nav-link {
            color: #94a3b8;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-link:hover, .nav-link.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-link i { margin-right: 12px; font-size: 1.2rem; }

        /* Main Content */
        .dashboard-content { margin-left: 280px; flex: 1; padding: 3rem; }

        .form-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
            padding: 3rem;
        }

        .logo-preview-container {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #cbd5e1;
            margin-bottom: 1.5rem;
        }

        .logo-preview-container img { width: 100%; height: 100%; object-fit: cover; }

        .form-label { font-weight: 600; font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
        }

        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); background-color: white; }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="dashboard-sidebar">
        <div class="mb-5 px-3"><h3 class="fw-bold"><i class="bi bi-rocket-takeoff-fill me-2 text-primary"></i>JobHub</h3></div>
        <nav class="nav flex-column mt-4">
            <a class="nav-link" href="employer-dashboard.html"><i class="bi bi-grid"></i> Overview</a>
            <a class="nav-link active" href="create-company.html"><i class="bi bi-building"></i> Company</a>
            <a class="nav-link" href="post-job.html"><i class="bi bi-plus-square"></i> Post Job</a>
            <hr class="my-4 border-secondary opacity-25">
            <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
        </nav>
    </aside>

    <main class="dashboard-content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-xl-9">
                    <div class="form-card">
                        <div class="d-flex align-items-center mb-4">
                            <div class="logo-preview-container me-4" id="logoFrame">
                                <i class="bi bi-image text-muted fs-2" id="placeholderIcon"></i>
                                <img id="logoPreview" src="" style="display: none;">
                            </div>
                            <div>
                                <h2 class="fw-bold mb-1">Company Profile</h2>
                                <p class="text-muted mb-0">Complete your business identity to start recruiting.</p>
                            </div>
                        </div>

                        <form id="companyForm">
                            <div class="row g-4">
                                <div class="col-md-12">
                                    <label class="form-label">Official Company Name *</label>
                                    <input type="text" id="companyName" class="form-control" placeholder="e.g. Acme Corporation Ltd" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Industry Type</label>
                                    <select id="industry" class="form-select">
                                        <option value="IT">Software & Technology</option>
                                        <option value="FINANCE">Finance & Banking</option>
                                        <option value="EDUCATION">Education & Training</option>
                                        <option value="MARKETING">Marketing & Creative</option>
                                        <option value="HEALTHCARE">Healthcare</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Company Website (URL)</label>
                                    <input type="url" id="website" class="form-control" placeholder="https://www.example.com">
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label">Company Logo URL</label>
                                    <input type="text" id="logoUrl" class="form-control" placeholder="Paste image link here (PNG/JPG)" oninput="updateLogoPreview(this.value)">
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label">Headquarters Location *</label>
                                    <input type="text" id="compLocation" class="form-control" placeholder="e.g. Colombo 03, Sri Lanka" required>
                                </div>

                                <div class="col-12">
                                    <label class="form-label">About the Company *</label>
                                    <textarea id="compDescription" class="form-control" rows="5" placeholder="Briefly describe your company's mission and culture..." required></textarea>
                                </div>

                                <div class="col-12 mt-5">
                                    <button type="submit" class="btn btn-primary w-100 py-3 shadow-lg">
                                        <i class="bi bi-save2 me-2"></i> Save Profile & Continue
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 1. Logo Preview Logic
    function updateLogoPreview(url) {
        const preview = document.getElementById('logoPreview');
        const icon = document.getElementById('placeholderIcon');
        const frame = document.getElementById('logoFrame');

        if (url && url.length > 10) {
            preview.src = url;
            preview.style.display = 'block';
            icon.style.display = 'none';
            frame.style.border = '2px solid #3b82f6';
        } else {
            preview.style.display = 'none';
            icon.style.display = 'block';
            frame.style.border = '2px dashed #cbd5e1';
        }
    }

    // 2. Form Submission
    document.getElementById('companyForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId'); // localStorage එකෙන් ID එක ගන්න

        // userId එක නැත්නම් error එකක් පෙන්වන්න
        if (!userId) {
            alert("User session expired. Please login again.");
            window.location.href = 'index.html';
            return;
        }

        const companyData = {
            companyName: document.getElementById('companyName').value,
            industry: document.getElementById('industry').value,
            website: document.getElementById('website').value,
            logoUrl: document.getElementById('logoUrl').value,
            location: document.getElementById('compLocation').value,
            description: document.getElementById('compDescription').value,
            userId: userId // 👈 මේක අනිවාර්යයෙන්ම තිබිය යුතුයි
        };

        fetch('http://localhost:8080/api/company/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(companyData)
        })
            .then(response => {
                if (response.ok) {
                    alert('Success! Company Profile is ready.');
                    window.location.href = 'post-job.html';
                } else if (response.status === 403) {
                    alert('Permission Denied (403). Check if you are logged in as an Employer.');
                } else {
                    alert('Something went wrong. Please check your details.');
                }
            })
            .catch(err => console.error("Error:", err));
    });


    function logout() {
        if(confirm("Sign out from JobHub?")) {
            localStorage.clear();
            window.location.replace('index.html');
        }
    }
</script>
</body>
</html>
