<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Posted Jobs | JobHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            color: #1e293b;
            padding: 1rem;
        }

        .dashboard-content { flex: 1; padding: 1rem; }

        .page-header { margin-bottom: 2rem; }

        .main-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            padding: 1.5rem;
        }

        /* Table Styling */
        .table thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            padding: 15px 20px;
            border: none;
        }

        .table tbody td {
            padding: 18px 20px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        /* Job Info Style */
        .job-title {
            font-weight: 700;
            color: #0f172a;
            display: block;
            margin-bottom: 2px;
        }

        .job-cat {
            font-size: 0.8rem;
            color: #64748b;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Status Badges */
        .status-badge {
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-btn {
            border: none;
            background: #f1f5f9;
            color: #475569;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 3px;
        }

        .action-btn:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
        }

        .btn-delete:hover { background: #ef4444; }

        .btn-add-new {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-add-new:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

<main class="dashboard-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-bold mb-0" style="font-size: 1.75rem;">Manage Your Jobs</h2>
            <p class="text-muted mt-1 small">Track and manage all your active vacancies.</p>
        </div>
        <button class="btn-add-new shadow-sm" onclick="window.parent.loadPage('post-job.html', window.parent.document.querySelector('[onclick*=\'post-job.html\']'))">
            <i class="bi bi-plus-lg me-2"></i>Post New Job
        </button>
    </div>

    <div class="main-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Job Information</th>
                    <th>Salary Range</th>
                    <th>Status</th>
                    <th class="text-center">Quick Actions</th>
                </tr>
                </thead>
                <tbody id="job-table-body">
                <tr>
                    <td colspan="4" class="text-center py-5">
                        <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
                        <p class="mt-2 text-muted small mb-0">Fetching your job listings...</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', loadMyJobs);

    function loadMyJobs() {
        const token = localStorage.getItem('token');

        // 1. Token එක නැත්නම් Login එකට redirect කරනවා
        if (!token) {
            window.parent.location.href = 'login.html';
            return;
        }

        // 2. API එකට Request එක යවනවා (Authorization Header එක සමඟ)
        fetch('http://localhost:8080/api/jobs/my-jobs', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                if (!response.ok) {
                    if(response.status === 401 || response.status === 403) {
                        window.parent.location.href = 'login.html';
                    }
                    throw new Error('සර්වර් එකෙන් දත්ත ලබා ගැනීමට නොහැකි විය.');
                }
                return response.json();
            })
            .then(jobs => {
                const tableBody = document.getElementById('job-table-body');
                tableBody.innerHTML = ''; // Spinner එක අයින් කරනවා

                // 3. දත්ත නැතිනම් පෙන්වන පණිවිඩය
                if (jobs.length === 0) {
                    tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="text-center py-5">
                            <i class="bi bi-briefcase text-muted fs-1 d-block mb-3"></i>
                            <p class="text-muted">තවමත් කිසිදු රැකියා අවස්ථාවක් පල කර නොමැත.</p>
                        </td>
                    </tr>`;
                    return;
                }

                // 4. JobDTO එකේ fields (id, title, jobType, salary) වලට අනුව Table එක පුරවනවා
                jobs.forEach(job => {
                    const salaryText = job.salary ? `Rs. ${Number(job.salary).toLocaleString()}` : 'Negotiable';

                    tableBody.innerHTML += `
                    <tr>
                        <td>
                            <span class="job-title">${job.title}</span>
                            <span class="job-cat">${job.jobType}</span>
                        </td>
                        <td class="fw-medium text-dark">${salaryText}</td>
                        <td><span class="status-badge bg-success bg-opacity-10 text-success">Active</span></td>
                        <td class="text-center">
                            <button class="action-btn" title="අයදුම්කරුවන් බලන්න" onclick="viewApplicants(${job.id})">
                                <i class="bi bi-people-fill"></i>
                            </button>
                            <button class="action-btn btn-delete" title="ඉවත් කරන්න" onclick="deleteJob(${job.id})">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </td>
                    </tr>
                `;
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('job-table-body').innerHTML =
                    '<tr><td colspan="4" class="text-center text-danger py-5">Backend එක සමඟ සම්බන්ධ වීමට නොහැක.</td></tr>';
            });
    }

    // --- Delete Function එක ---
    function deleteJob(id) {
        if (!confirm('මෙම රැකියා අවස්ථාව ඉවත් කිරීමට ඔබට සහතිකද?')) return;

        const token = localStorage.getItem('token');
        fetch(`http://localhost:8080/api/jobs/delete/${id}`, {
            method: 'DELETE',
            headers: {
                'Authorization': 'Bearer ' + token
            }
        })
            .then(response => {
                if (response.ok) {
                    alert('රැකියාව සාර්ථකව ඉවත් කළා!');
                    loadMyJobs(); // Table එක refresh කරනවා
                } else {
                    alert('ඉවත් කිරීමට නොහැකි විය.');
                }
            })
            .catch(error => console.error('Error:', error));
    }

    // --- Applicants බලන Function එක ---
    function viewApplicants(id) {
        // මෙතනදී Applicants පේජ් එකට යවන්න පුළුවන්
        console.log("Viewing applicants for Job ID:", id);
        // window.parent.loadPage('view-applicants.html?jobId=' + id);
    }
</script>
</body>
</html>
