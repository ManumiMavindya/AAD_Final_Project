<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* ලස්සන Gradient පසුබිමක් */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* වීදුරුවක් වැනි පෙනුමක් ලබා දීමට */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #764ba2;
            text-align: center;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #764ba2;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #5a3686;
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.2);
            border-color: #764ba2;
        }

        /* පින්තූරයක් හෝ icon එකක් දාන්න ඕනේ නම් */
        .header-text {
            color: #6c757d;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-logo">JobHub</div>
    <div class="header-text">Create your account to start your journey</div>

    <form id="registerForm">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="mb-4">
            <label class="form-label">I am joining as a...</label>
            <select id="role" class="form-select" required>
                <option value="" disabled selected>Select your role</option>
                <option value="JOB_SEEKER">Job Seeker</option>
                <option value="EMPLOYER">Employer</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>
    </form>

    <div class="text-center mt-2">
        <small class="text-muted">Already have an account?
            <a href="index.html" class="text-decoration-none" style="color: #764ba2; font-weight: 600;">Login here</a>
        </small>
    </div>
</div>

<script src="../js/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
