<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub | Create Account</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #0062ff;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --input-bg: #f8fafc;
            --border-soft: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .register-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border-soft);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .sub-title {
            color: #64748b;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* --- Updated Compact Text Field Styling --- */
        .input-wrapper {
            position: relative;
            margin-bottom: 18px;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
            transition: 0.3s;
            z-index: 10;
        }

        .form-control, .form-select {
            height: 50px; /* Height එක අඩු කළා */
            padding: 10px 15px 10px 48px;
            border-radius: 12px; /* Border radius පොඩ්ඩක් අඩු කළා cleaner look එකට */
            border: 1.5px solid var(--border-soft);
            background-color: var(--input-bg);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: all 0.25s ease;
        }

        /* --- Hover Effect --- */
        .form-control:hover, .form-select:hover {
            border-color: #cbd5e1;
            background-color: #fff;
        }

        /* --- Focus State --- */
        .form-control:focus, .form-select:focus {
            background-color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.08);
            outline: none;
        }

        .input-wrapper:focus-within i {
            color: var(--primary-blue);
        }

        /* Submit Button */
        .btn-register {
            background: var(--primary-blue);
            color: white;
            border: none;
            height: 50px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #0056e0;
            box-shadow: 0 8px 20px rgba(0, 98, 255, 0.15);
            transform: translateY(-1px);
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-text a {
            color: var(--primary-blue);
            text-decoration: none;
        }

        /* Select Arrow Styling */
        .form-select {
            background-position: right 15px center;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="brand-section">
        <div class="brand-logo">
            <i class="bi bi-briefcase-fill"></i>JobHub
        </div>
        <div class="sub-title">Sign up to get started</div>
    </div>

    <form id="registerForm">
        <div class="input-wrapper">
            <i class="bi bi-person"></i>
            <input type="text" id="name" class="form-control shadow-none" placeholder="Full Name" required>
        </div>

        <div class="input-wrapper">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" class="form-control shadow-none" placeholder="Email Address" required>
        </div>

        <div class="input-wrapper">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" class="form-control shadow-none" placeholder="Password" required>
        </div>

        <div class="input-wrapper">
            <i class="bi bi-people"></i>
            <select id="role" class="form-select shadow-none" required>
                <option value="" disabled selected>Register as...</option>
                <option value="JOB_SEEKER">Job Seeker</option>
                <option value="EMPLOYER">Employer</option>
            </select>
        </div>

        <button type="submit" class="btn btn-register shadow-sm">
            Create Account
        </button>
    </form>

    <div class="footer-text">
        Already a member? <a href="index.html">Login here</a>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
