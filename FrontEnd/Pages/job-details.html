<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - JobHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="icon" type="image/png" href="../../uploads/jobhub_logo/img.png">
    <link rel="stylesheet" href="../css/job-details.css">
    <script src="../js/auth-gurd.js"></script>


</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-dark" href="index.html">
            <i class="bi bi-intersect text-primary me-2"></i>JobHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="jobs.html" class="text-decoration-none">Jobs</a></li>
                <li class="breadcrumb-item active" id="breadcrumbJobTitle">Details</li>
            </ol>
        </nav>

        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-center flex-wrap flex-md-nowrap">
                    <div class="company-logo shadow-sm mb-3 mb-md-0 me-md-4">
                        <i class="bi bi-building"></i>
                    </div>
                    <div>
                        <h1 class="fw-bold mb-1" id="detTitle" style="letter-spacing: -0.5px;">Loading Job Title...</h1>
                        <p class="fs-5 text-secondary mb-3 fw-medium" id="detCompany">Loading Company...</p>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge-outline" id="detLocation"><i class="bi bi-geo-alt me-1"></i> -</span>
                            <span class="badge-outline" id="detType"><i class="bi bi-clock me-1"></i> -</span>
                            <span class="badge-salary" id="detSalary">LKR 0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 mt-4 mt-lg-0 text-lg-end">
                <div class="d-flex gap-3 justify-content-lg-end">
                    <button class="btn btn-save btn-lg px-3 shadow-sm" id="saveJobBtn" onclick="toggleSaveJob()">
                        <i class="bi bi-bookmark fs-5" id="saveIcon"></i>
                    </button>
                    <button class="btn btn-primary btn-apply-now btn-lg px-5 shadow-sm flex-grow-1 flex-lg-grow-0" data-bs-toggle="modal" data-bs-target="#applyModal">
                        Apply Now
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold mb-4" style="color: #0f172a;">Job Description</h4>
                        <div id="detDescription" style="white-space: pre-line; line-height: 1.8; color: #475569; font-size: 1.05rem;">
                            Loading full job description...
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card job-overview-card shadow-sm border-0 sticky-lg-top" style="top: 100px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4" style="color: #0f172a;">Job Overview</h5>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Date Posted</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-calendar3"></i></span>
                                <span class="fw-bold" id="sidePostedDate">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Employment Type</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-briefcase"></i></span>
                                <span class="fw-bold" id="sideJobType">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Work Mode</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-laptop"></i></span>
                                <span class="badge bg-primary bg-opacity-10 text-primary fw-bold px-3 py-2" id="sideWorkMode" style="border-radius: 8px;">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Experience Level</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-bar-chart"></i></span>
                                <span class="fw-bold" id="sideExperience">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Annual Salary</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon text-success bg-success bg-opacity-10"><i class="bi bi-cash-stack"></i></span>
                                <span class="text-success fw-bold fs-5" id="sideSalary">-</span>
                            </div>
                        </div>

                        <div class="mb-0">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Location</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-geo-alt"></i></span>
                                <span class="fw-bold" id="sideLocation">-</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="applyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header px-4 pt-4 border-0">
                <h4 class="modal-title fw-bold" style="letter-spacing: -0.5px;">Submit Application</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="applyForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Full Name</label>
                        <input type="text" class="form-control" id="applicantName" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Email Address</label>
                        <input type="email" class="form-control" id="applicantEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Contact Number</label>
                        <input type="tel" class="form-control" id="applicantPhone" placeholder="07X XXX XXXX" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">Resume (PDF Only)</label>
                        <input type="file" class="form-control" id="resumeFile" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px;">
                        Send Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/job-details.js"></script>
</body>
</html>
