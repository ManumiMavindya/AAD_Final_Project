<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - JobHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        /* --- Navbar Customization (Matching Dashboard) --- */
        .navbar {
            border-bottom: 1px solid #e2e8f0;
            background: white !important;
            padding: 15px 0;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            color: #212529 !important;
        }
        .nav-link {
            font-weight: 600;
            color: #64748b !important;
            transition: 0.3s;
            padding: 8px 16px !important;
        }
        .nav-link:hover, .nav-link.active {
            color: #0d6efd !important;
        }

        /* Hero Section Styling */
        .hero-section {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 40px 0;
        }

        .company-logo {
            width: 80px;
            height: 80px;
            background: rgba(13, 110, 253, 0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(13, 110, 253, 0.1);
        }

        .company-logo i {
            font-size: 2.2rem;
            color: #0d6efd;
        }

        /* Badges & UI Elements */
        .badge-outline {
            background: #f1f5f9;
            border: none;
            color: #475569;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 10px;
        }

        .badge-salary {
            background-color: rgba(25, 135, 84, 0.1);
            color: #198754;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .card {
            border-radius: 24px;
            border: 1px solid #e2e8f0;
        }

        .overview-icon {
            width: 38px;
            height: 38px;
            background: #f8fafc;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #0d6efd;
            border: 1px solid #f1f5f9;
        }

        /* Buttons */
        .btn-save {
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            transition: all 0.3s;
        }

        .btn-save:hover, .btn-save.active {
            background-color: #fff1f2;
            border-color: #f43f5e;
            color: #f43f5e;
        }

        .btn-apply-now {
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 700;
            background: #0d6efd;
            border: none;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.15);
            transition: all 0.3s;
        }

        .btn-apply-now:hover {
            background: #004dc7;
            transform: translateY(-2px);
        }

        .breadcrumb-item a {
            color: #64748b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Modal Customization */
        .modal-content {
            border-radius: 28px;
            border: none;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .form-control:focus {
            background: white;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-dark" href="index.html">
            <i class="bi bi-intersect text-primary me-2"></i>JobHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="jobs.html" class="text-decoration-none">Jobs</a></li>
                <li class="breadcrumb-item active" id="breadcrumbJobTitle">Details</li>
            </ol>
        </nav>

        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-center flex-wrap flex-md-nowrap">
                    <div class="company-logo shadow-sm mb-3 mb-md-0 me-md-4">
                        <i class="bi bi-building"></i>
                    </div>
                    <div>
                        <h1 class="fw-bold mb-1" id="detTitle" style="letter-spacing: -0.5px;">Loading Job Title...</h1>
                        <p class="fs-5 text-secondary mb-3 fw-medium" id="detCompany">Loading Company...</p>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge-outline" id="detLocation"><i class="bi bi-geo-alt me-1"></i> -</span>
                            <span class="badge-outline" id="detType"><i class="bi bi-clock me-1"></i> -</span>
                            <span class="badge-salary" id="detSalary">LKR 0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 mt-4 mt-lg-0 text-lg-end">
                <div class="d-flex gap-3 justify-content-lg-end">
                    <button class="btn btn-save btn-lg px-3 shadow-sm" id="saveJobBtn" onclick="toggleSaveJob()">
                        <i class="bi bi-bookmark fs-5" id="saveIcon"></i>
                    </button>
                    <button class="btn btn-primary btn-apply-now btn-lg px-5 shadow-sm flex-grow-1 flex-lg-grow-0" data-bs-toggle="modal" data-bs-target="#applyModal">
                        Apply Now
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold mb-4" style="color: #0f172a;">Job Description</h4>
                        <div id="detDescription" style="white-space: pre-line; line-height: 1.8; color: #475569; font-size: 1.05rem;">
                            Loading full job description...
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card job-overview-card shadow-sm border-0 sticky-lg-top" style="top: 100px;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4" style="color: #0f172a;">Job Overview</h5>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Date Posted</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-calendar3"></i></span>
                                <span class="fw-bold" id="sidePostedDate">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Employment Type</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-briefcase"></i></span>
                                <span class="fw-bold" id="sideJobType">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Work Mode</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-laptop"></i></span>
                                <span class="badge bg-primary bg-opacity-10 text-primary fw-bold px-3 py-2" id="sideWorkMode" style="border-radius: 8px;">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Experience Level</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-bar-chart"></i></span>
                                <span class="fw-bold" id="sideExperience">-</span>
                            </div>
                        </div>

                        <div class="mb-3 pb-3 border-bottom border-light">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Annual Salary</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon text-success bg-success bg-opacity-10"><i class="bi bi-cash-stack"></i></span>
                                <span class="text-success fw-bold fs-5" id="sideSalary">-</span>
                            </div>
                        </div>

                        <div class="mb-0">
                            <small class="text-muted d-block mb-2 fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px;">Location</small>
                            <div class="d-flex align-items-center">
                                <span class="overview-icon"><i class="bi bi-geo-alt"></i></span>
                                <span class="fw-bold" id="sideLocation">-</span>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="applyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header px-4 pt-4 border-0">
                <h4 class="modal-title fw-bold" style="letter-spacing: -0.5px;">Submit Application</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="applyForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Full Name</label>
                        <input type="text" class="form-control" id="applicantName" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Email Address</label>
                        <input type="email" class="form-control" id="applicantEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">Contact Number</label>
                        <input type="tel" class="form-control" id="applicantPhone" placeholder="07X XXX XXXX" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">Resume (PDF Only)</label>
                        <input type="file" class="form-control" id="resumeFile" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" style="border-radius: 12px;">
                        Send Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- Navbar Logic (Updated to Match Dashboard) ---
    function updateNavbar() {
        const navbarCollapse = document.getElementById('navbarNav');
        const token = localStorage.getItem('token');
        const userRole = localStorage.getItem('userRole');

        let content = `<ul class="navbar-nav mx-auto gap-2">
            <li class="nav-item"><a class="nav-link fw-semibold" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link fw-semibold active" href="jobs.html">Find Jobs</a></li>`;

        if (token) {
            if (userRole === 'EMPLOYER') {
                content += `
                    <li class="nav-item"><a class="nav-link fw-semibold" href="employer-dashboard.html">Employer Portal</a></li>
                    <li class="nav-item"><a class="nav-link fw-semibold" href="post-job.html">Post a Job</a></li>`;
            } else {
                content += `<li class="nav-item"><a class="nav-link fw-semibold" href="seeker-dashboard.html">Dashboard</a></li>`;
            }
            content += `</ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-danger btn-sm fw-bold px-4" style="border-radius: 10px;" onclick="logout()">Sign Out</button>
                </div>`;
        } else {
            content += `</ul>
                <div class="d-flex align-items-center gap-2">
                    <a class="nav-link fw-semibold px-3 text-secondary" href="login.html" style="text-decoration:none;">Login</a>
                    <a class="btn btn-primary btn-sm fw-bold px-4 text-white" href="register.html" style="border-radius: 10px; background: #0d6efd; border:none;">Register</a>
                </div>`;
        }
        navbarCollapse.innerHTML = content;
    }

    function logout() {
        Swal.fire({
            title: 'Are you sure?',
            text: "You will be signed out from your account!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#0d6efd',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, Sign Out'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        });
    }

    // --- Job Logic (UNCHANGED) ---
    let currentJobId = null;

    document.addEventListener('DOMContentLoaded', function() {
        updateNavbar();
        const urlParams = new URLSearchParams(window.location.search);
        currentJobId = urlParams.get('id');

        if (currentJobId) {
            fetchJobDetails(currentJobId);
            checkIfSaved();
        } else {
            window.location.href = 'jobs.html';
        }
    });

    async function fetchJobDetails(id) {
        try {
            const response = await fetch(`http://localhost:8080/api/jobs/${id}`);
            if (!response.ok) throw new Error("Job not found");

            const job = await response.json();

            document.getElementById('detTitle').textContent = job.title;
            document.getElementById('breadcrumbJobTitle').textContent = job.title;
            document.getElementById('detCompany').innerHTML = `${job.companyName || 'Verified Employer'} <i class="bi bi-check-circle-fill text-primary ms-1 small"></i>`;

            document.getElementById('detLocation').innerHTML = `<i class="bi bi-geo-alt me-1"></i>${job.location}`;
            document.getElementById('detType').innerHTML = `<i class="bi bi-clock me-1"></i>${job.jobType.replace('_', ' ')}`;
            document.getElementById('detSalary').innerHTML = `LKR ${job.salary.toLocaleString()}`;

            document.getElementById('detDescription').textContent = job.description;

            document.getElementById('sideJobType').textContent = job.jobType.replace('_', ' ');
            document.getElementById('sideSalary').textContent = `LKR ${job.salary.toLocaleString()}`;
            document.getElementById('sideLocation').textContent = job.location;
            document.getElementById('sideExperience').textContent = job.experienceLevel || 'Not Specified';

            const workModeText = job.workArrangement || 'Not Specified';
            document.getElementById('sideWorkMode').textContent = workModeText.replace('_', ' ');

            if (job.postedDate) {
                let date;
                if (Array.isArray(job.postedDate)) {
                    date = new Date(job.postedDate[0], job.postedDate[1]-1, job.postedDate[2]);
                } else {
                    date = new Date(job.postedDate);
                }
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('sidePostedDate').textContent = date.toLocaleDateString('en-US', options);
            } else {
                document.getElementById('sidePostedDate').textContent = "Recently Posted";
            }

        } catch (error) {
            console.error("Error:", error);
            document.body.innerHTML = `<div class="container py-5 text-center"><h3>Job Not Found</h3><a href="jobs.html" class="btn btn-primary mt-3">Back to Jobs</a></div>`;
        }
    }

    function toggleSaveJob() {
        let savedJobs = JSON.parse(localStorage.getItem('savedJobs')) || [];
        const btn = document.getElementById('saveJobBtn');
        const icon = document.getElementById('saveIcon');

        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true
        });

        if (savedJobs.includes(currentJobId)) {
            savedJobs = savedJobs.filter(id => id !== currentJobId);
            btn.classList.remove('active');
            icon.classList.replace('bi-bookmark-fill', 'bi-bookmark');
            Toast.fire({ icon: 'info', title: 'Removed from saved list' });
        } else {
            savedJobs.push(currentJobId);
            btn.classList.add('active');
            icon.classList.replace('bi-bookmark', 'bi-bookmark-fill');
            Toast.fire({ icon: 'success', title: 'Job saved successfully!' });
        }
        localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
    }

    function checkIfSaved() {
        const savedJobs = JSON.parse(localStorage.getItem('savedJobs')) || [];
        const btn = document.getElementById('saveJobBtn');
        const icon = document.getElementById('saveIcon');
        if (savedJobs.includes(currentJobId)) {
            btn.classList.add('active');
            icon.classList.replace('bi-bookmark', 'bi-bookmark-fill');
        }
    }

    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loggedInUserId = localStorage.getItem('userId');

        if (!loggedInUserId) {
            Swal.fire({
                title: 'Login Required',
                text: "Please login to apply for this job!",
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#0d6efd',
                confirmButtonText: 'Login Now'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = 'login.html';
                }
            });
            return;
        }

        try {
            const formData = new FormData();
            const jobId = currentJobId;

            formData.append('jobId', jobId);
            formData.append('userId', loggedInUserId);
            formData.append('contactNo', document.getElementById('applicantPhone').value);
            formData.append('file', document.getElementById('resumeFile').files[0]);

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            Swal.fire({
                title: 'Submitting Application...',
                text: 'Uploading your CV, please wait.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const token = localStorage.getItem('token');

            const response = await fetch('http://localhost:8080/api/apply/submit-with-cv', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: 'Your application has been submitted successfully! ✅',
                    confirmButtonColor: '#0d6efd'
                });
                bootstrap.Modal.getInstance(document.getElementById('applyModal')).hide();
                e.target.reset();
            } else {
                const errorMsg = await response.text();
                Swal.fire({
                    icon: 'error',
                    title: 'Submission Failed',
                    text: errorMsg || 'Something went wrong.',
                    confirmButtonColor: '#d33'
                });
            }
        } catch (error) {
            console.error("Error:", error);
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: 'Server connection failed! Please try again later.',
                confirmButtonColor: '#d33'
            });
        } finally {
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
