<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - JobHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="index.html">
            <i class="bi bi-briefcase-fill me-2"></i>JobHub
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="jobs.html">Find Jobs</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="bg-light py-4">
    <div class="container" id="mainHeader">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small">
                <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="jobs.html" class="text-decoration-none">Jobs</a></li>
                <li class="breadcrumb-item active" id="breadcrumbJobTitle">Job Details</li>
            </ol>
        </nav>

        <div class="row align-items-center">
            <div class="col-lg-8">
                <div class="d-flex align-items-start">
                    <div class="company-logo bg-primary bg-opacity-10 rounded-3 p-3 me-4" style="width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-building text-primary fs-1"></i>
                    </div>
                    <div>
                        <h1 class="h2 fw-bold mb-1" id="detTitle">Loading Job Title...</h1>
                        <p class="text-muted mb-2" id="detCompany">Loading Company...</p>
                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge bg-white text-dark border" id="detLocation"></span>
                            <span class="badge bg-white text-dark border" id="detType"></span>
                            <span class="badge bg-success bg-opacity-10 text-success fw-bold" id="detSalary"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 mt-4 mt-lg-0 text-lg-end">
                <div class="d-flex gap-2 justify-content-lg-end">
                    <button class="btn btn-outline-primary btn-lg px-3 btn-save" id="saveJobBtn" onclick="toggleSaveJob()">
                        <i class="bi bi-bookmark" id="saveIcon"></i>
                    </button>
                    <button class="btn btn-primary btn-lg px-4 flex-grow-1 flex-lg-grow-0" data-bs-toggle="modal" data-bs-target="#applyModal">
                        <i class="bi bi-send me-2"></i>Apply Now
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3 border-bottom pb-2">Job Description</h5>
                        <p id="detDescription" style="white-space: pre-line; line-height: 1.7; color: #444;">
                            Loading full job description...
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm mb-4 sticky-lg-top" style="top: 90px;">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-4 border-bottom pb-2">Job Overview</h6>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1"><i class="bi bi-calendar-event me-2"></i>Job Posted</small>
                            <span class="fw-semibold" id="sidePostedDate">-</span>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1"><i class="bi bi-briefcase me-2"></i>Job Type</small>
                            <span class="fw-semibold" id="sideJobType">-</span>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1"><i class="bi bi-laptop me-2"></i>Work Arrangement</small>
                            <span id="sideWorkMode" class="badge bg-info bg-opacity-10 text-info">-</span>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1"><i class="bi bi-bar-chart me-2"></i>Experience Level</small>
                            <span class="fw-semibold" id="sideExperience">-</span>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted d-block mb-1"><i class="bi bi-cash-stack me-2"></i>Salary Range</small>
                            <span class="text-success fw-bold" id="sideSalary">-</span>
                        </div>

                        <div class="mb-0">
                            <small class="text-muted d-block mb-1"><i class="bi bi-geo-alt me-2"></i>Location</small>
                            <span class="fw-semibold" id="sideLocation">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="applyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Submit Your Application</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="applyForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" class="form-control" id="applicantName" placeholder="Enter your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="applicantEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Contact Number</label>
                        <input type="tel" class="form-control" id="applicantPhone" placeholder="07X XXX XXXX" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Upload Resume (PDF)</label>
                        <input type="file" class="form-control" id="resumeFile" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-cloud-upload me-2"></i>Submit Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

    let currentJobId = null;

    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        currentJobId = urlParams.get('id');

        if (currentJobId) {
            fetchJobDetails(currentJobId);
            checkIfSaved();
        } else {
            window.location.href = 'jobs.html';
        }
    });

    async function fetchJobDetails(id) {
        try {
            const response = await fetch(`http://localhost:8080/api/jobs/${id}`);
            if (!response.ok) throw new Error("Job not found");

            const job = await response.json();

            // Headers
            document.getElementById('detTitle').textContent = job.title;
            document.getElementById('breadcrumbJobTitle').textContent = job.title;
            document.getElementById('detCompany').innerHTML = `${job.companyName || 'Verified Employer'} <i class="bi bi-check-circle-fill text-primary ms-1 small" title="Verified"></i>`;

            // Badges
            document.getElementById('detLocation').innerHTML = `<i class="bi bi-geo-alt me-1"></i>${job.location}`;
            document.getElementById('detType').innerHTML = `<i class="bi bi-clock me-1"></i>${job.jobType.replace('_', ' ')}`;
            document.getElementById('detSalary').innerHTML = `<i class="bi bi-currency-dollar me-1"></i>$${job.salary.toLocaleString()}`;

            // Description
            document.getElementById('detDescription').textContent = job.description;

            // Sidebar - මම මෙතන job.workMode කියන එක use කරනවා. Backend එකේ field එක වෙනස් නම් ඒක දාන්න.
            document.getElementById('sideJobType').textContent = job.jobType.replace('_', ' ');
            document.getElementById('sideSalary').textContent = `$${job.salary.toLocaleString()} / year`;
            document.getElementById('sideLocation').textContent = job.location;
            document.getElementById('sideExperience').textContent = job.experienceLevel || 'Not Specified';

            // Work Arrangement update
            const workModeText = job.workArrangement || 'Not Specified';
            document.getElementById('sideWorkMode').textContent = workModeText.replace('_', ' ');

            // Date Formatting
            if (job.postedDate) {
                let date;
                if (Array.isArray(job.postedDate)) {
                    date = new Date(job.postedDate[0], job.postedDate[1]-1, job.postedDate[2]);
                } else {
                    date = new Date(job.postedDate);
                }
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('sidePostedDate').textContent = date.toLocaleDateString('en-US', options);
            } else {
                document.getElementById('sidePostedDate').textContent = "Recently Posted";
            }

        } catch (error) {
            console.error("Error:", error);
            document.body.innerHTML = `<div class="container py-5 text-center"><h3>Job Not Found</h3><a href="jobs.html" class="btn btn-primary mt-3">Back to Jobs</a></div>`;
        }
    }

    // --- Save Job Logic ---

    function toggleSaveJob() {
        let savedJobs = JSON.parse(localStorage.getItem('savedJobs')) || [];
        const btn = document.getElementById('saveJobBtn');
        const icon = document.getElementById('saveIcon');

        if (savedJobs.includes(currentJobId)) {
            // Unsave
            savedJobs = savedJobs.filter(id => id !== currentJobId);
            btn.classList.remove('active');
            icon.classList.replace('bi-bookmark-fill', 'bi-bookmark');
            alert("Job removed from saved list!");
        } else {
            // Save
            savedJobs.push(currentJobId);
            btn.classList.add('active');
            icon.classList.replace('bi-bookmark', 'bi-bookmark-fill');
            alert("Job saved successfully!");
        }

        localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
    }

    function checkIfSaved() {
        const savedJobs = JSON.parse(localStorage.getItem('savedJobs')) || [];
        const btn = document.getElementById('saveJobBtn');
        const icon = document.getElementById('saveIcon');

        if (savedJobs.includes(currentJobId)) {
            btn.classList.add('active');
            icon.classList.replace('bi-bookmark', 'bi-bookmark-fill');
        }
    }

    // PDF Upload Logic - මීළඟට මේක Backend එකට සම්බන්ධ කරමු
    document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const loggedInUserId = localStorage.getItem('userId');
        if (!loggedInUserId) {
            alert("Please login to apply for this job!");
            window.location.href = 'login.html';
            return;
        }

        // --- මෙතන ඉඳන් තමයි try block එක පටන් ගන්න ඕනේ ---
        try {
            const formData = new FormData();
            const jobId = new URLSearchParams(window.location.search).get('id');

            formData.append('jobId', jobId);
            formData.append('userId', loggedInUserId);
            formData.append('contactNo', document.getElementById('applicantPhone').value);
            formData.append('file', document.getElementById('resumeFile').files[0]);

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Submitting...';

            const token = localStorage.getItem('token');

            const response = await fetch('http://localhost:8080/api/apply/submit-with-cv', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token
                },
                body: formData
            });

            if (response.ok) {
                const msg = await response.text();
                alert("Success: " + msg);
                const modal = bootstrap.Modal.getInstance(document.getElementById('applyModal'));
                modal.hide();
                e.target.reset();
            } else {
                const errorMsg = await response.text();
                alert("Submission failed: " + errorMsg);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Server connection failed!");
        } finally {
            // බටන් එක ආයේ reset කරන එක මෙතන කරන්න ඕනේ
            const submitBtn = e.target.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>Submit Application';
            }
        }
    });
</script>
</body>
</html>
