<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub | Modern Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-blue: #0062ff;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --input-bg: #f8fafc;
            --border-soft: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            background-image: radial-gradient(circle at 5% 15%, rgba(0, 98, 255, 0.04) 0%, transparent 40%),
            radial-gradient(circle at 95% 85%, rgba(0, 98, 255, 0.04) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border-soft);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: -1.2px;
            margin-bottom: 8px;
        }

        .sub-title {
            color: #64748b;
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* --- Modern Text Field Styling (Register එකට සමානයි) --- */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
            transition: 0.3s;
            z-index: 10;
        }

        .form-control {
            height: 50px;
            padding: 10px 15px 10px 48px;
            border-radius: 12px;
            border: 1.5px solid var(--border-soft);
            background-color: var(--input-bg);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: all 0.25s ease;
        }

        /* Hover & Focus Effects */
        .form-control:hover {
            border-color: #cbd5e1;
            background-color: #fff;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.08);
            outline: none;
        }

        .input-wrapper:focus-within i {
            color: var(--primary-blue);
        }

        /* Login Button */
        .btn-primary {
            background: var(--primary-blue);
            color: white;
            border: none;
            height: 50px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0, 98, 255, 0.1);
        }

        .btn-primary:hover {
            background: #0056e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 98, 255, 0.2);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer-text a {
            color: var(--primary-blue);
            text-decoration: none;
            margin-left: 4px;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Placeholder Color */
        .form-control::placeholder {
            color: #94a3b8;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-section">
        <div class="brand-logo">
            <i class="bi bi-briefcase-fill me-1"></i> JobHub
        </div>
        <div class="sub-title">Welcome back! Please login to your account</div>
    </div>

    <form id="loginForm">
        <div class="input-wrapper">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" class="form-control shadow-none" placeholder="Email Address" required>
        </div>

        <div class="input-wrapper">
            <i class="bi bi-lock"></i>
            <input type="password" id="password" class="form-control shadow-none" placeholder="Password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 px-1">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label small text-muted fw-500" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small text-primary fw-bold text-decoration-none">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary shadow-sm">
            Login Now
        </button>
    </form>

    <div class="footer-text">
        Don't have an account? <a href="register.html">Create Account</a>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
