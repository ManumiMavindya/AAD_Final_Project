<section class="bg-primary py-4">
    <div class="container">
        <div class="row g-3">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" id="jobSearch" placeholder="Job title, keywords, or company">
                </div>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-geo-alt text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" placeholder="City, state, or remote">
                </div>
            </div>
            <div class="col-md-3">
                <button type="button" class="btn btn-light w-100" onclick="loadJobsFromDB()">
                    <i class="bi bi-search me-2"></i>Search Jobs

            </div>
        </div>
    </div>

<section class="py-4">
    <div class="container">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="filter-sidebar p-3 bg-white rounded shadow-sm border">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0">Filters</h6>
                        <button class="btn btn-sm btn-link text-muted p-0 text-decoration-none" id="clearFilters">Clear All</button>
                    </div>

                    <form id="filterForm">
                        <div class="filter-section mb-4">
                            <h6 class="small fw-bold mb-3">Job Type</h6>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="ft"><label class="form-check-label small" for="ft">Full-time</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="pt"><label class="form-check-label small" for="pt">Part-time</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="ct"><label class="form-check-label small" for="ct">Contract</label></div>
                        </div>

                        <div class="filter-section mb-4">
                            <h6 class="small fw-bold mb-3">Work Mode</h6>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="remote"><label class="form-check-label small" for="remote">Remote</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="onsite"><label class="form-check-label small" for="onsite">On-site</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="hybrid"><label class="form-check-label small" for="hybrid">Hybrid</label></div>
                        </div>

                        <div class="filter-section mb-4">
                            <h6 class="small fw-bold mb-3">Experience Level</h6>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="entry"><label class="form-check-label small" for="entry">Entry Level</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="mid"><label class="form-check-label small" for="mid">Mid Level</label></div>
                            <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="senior"><label class="form-check-label small" for="senior">Senior Level</label></div>
                        </div>

                        <div class="filter-section mb-2">
                            <h6 class="small fw-bold mb-3">Salary Range</h6>
                            <input type="range" class="form-range" id="salaryRange" min="0" max="250000" step="5000" value="0">
                            <div class="d-flex justify-content-between small text-muted">
                                <span>$0</span><span id="salaryValue">$0</span><span>$250K+</span>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <p class="mb-0 text-muted"><strong id="jobCount">0</strong> jobs found</p>
                    <select class="form-select form-select-sm" style="width: auto;">
                        <option>Newest First</option>
                        <option>Salary: High to Low</option>
                    </select>
                </div>

                <div id="jobListings"></div>

                <nav class="mt-4">
                    <ul class="pagination justify-content-center" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</section>

<script>
    let allJobs = [];
    let filteredJobs = []; // Search සහ Filters වලට පස්සේ ඉතිරි වන ටික
    let currentPage = 1;
    const jobsPerPage = 5;

    document.addEventListener('DOMContentLoaded', () => {
        loadJobsFromDB();

        // හැම Filter එකකටම Event Listener එකක් දාමු (ක්ලික් කරපු ගමන් වැඩ කරන්න)
        document.querySelectorAll('.form-check-input, #salaryRange').forEach(element => {
            element.addEventListener('change', applyFiltersAndSearch);
        });

        // Search Bar එකේ ටයිප් කරන කොටම හොයන්න
        document.getElementById('jobSearch').addEventListener('input', applyFiltersAndSearch);

        // Clear All button එක වැඩ කරවමු
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('filterForm').reset();
            document.getElementById('salaryValue').textContent = '$0';
            applyFiltersAndSearch();
        });
    });

    // Salary slider එකේ අගය පෙන්වීම
    document.getElementById('salaryRange').addEventListener('input', function(e) {
        document.getElementById('salaryValue').textContent = '$' + (e.target.value / 1000) + 'K';
    });

    async function loadJobsFromDB() {
        try {
            const response = await fetch('http://localhost:8080/api/jobs/all');
            allJobs = await response.json();
            applyFiltersAndSearch(); // මුලින්ම ඔක්කොම පෙන්වන්න
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('jobListings').innerHTML = '<div class="alert alert-danger">Server connection failed.</div>';
        }
    }

    function applyFiltersAndSearch() {
        const searchText = document.getElementById('jobSearch').value.toLowerCase();
        const minSalary = parseInt(document.getElementById('salaryRange').value);

        // තෝරාගෙන තියෙන Checkbox වල IDs ගන්න
        const getSelectedFilters = (ids) => ids.filter(id => document.getElementById(id).checked);

        const selectedTypes = getSelectedFilters(['ft', 'pt', 'ct']);
        const selectedModes = getSelectedFilters(['remote', 'onsite', 'hybrid']);
        const selectedLevels = getSelectedFilters(['entry', 'mid', 'senior']);

        filteredJobs = allJobs.filter(job => {
            // 1. Text Search (Title, Company හෝ Location)
            const matchesSearch = job.title.toLowerCase().includes(searchText) ||
                job.companyName?.toLowerCase().includes(searchText) ||
                job.location.toLowerCase().includes(searchText);

            // 2. Salary Filter
            const matchesSalary = job.salary >= minSalary;

            // 3. Job Type Filter (කිසිවක් තෝරා නැත්නම් ඔක්කොම පෙන්වයි)
            const matchesType = selectedTypes.length === 0 || selectedTypes.some(type =>
                (type === 'ft' && job.jobType === 'FULL_TIME') ||
                (type === 'pt' && job.jobType === 'PART_TIME') ||
                (type === 'ct' && job.jobType === 'CONTRACT')
            );

            // 4. Experience Level & Work Mode (මේවා ඔයාගේ Backend එකේ තිබෙන විදිහට compare කරන්න)
            // දැනට මම මේවා සරලව දාන්නම්:
            const matchesLevel = selectedLevels.length === 0 || selectedLevels.includes(job.experienceLevel?.toLowerCase());
            const matchesMode = selectedModes.length === 0 || selectedModes.includes(job.workMode?.toLowerCase());

            return matchesSearch && matchesSalary && matchesType && matchesLevel && matchesMode;
        });

        displayPage(1);
        renderPagination();
    }

    function displayPage(page) {
        currentPage = page;
        const jobContainer = document.getElementById('jobListings');
        jobContainer.innerHTML = '';

        const start = (page - 1) * jobsPerPage;
        const end = start + jobsPerPage;
        const pageItems = filteredJobs.slice(start, end);

        if (pageItems.length === 0) {
            jobContainer.innerHTML = '<div class="text-center py-5 text-muted">No jobs found matching your criteria.</div>';
        }

        pageItems.forEach(job => {
            // ... ඔයාගේ පරණ jobCard HTML එක මෙතනට එන්න ඕනේ ...
            let dateDisplay = "Recently posted";
            if (job.postedDate) {
                let date = Array.isArray(job.postedDate) ?
                    new Date(job.postedDate[0], job.postedDate[1]-1, job.postedDate[2]) : new Date(job.postedDate);
                dateDisplay = timeAgo(date);
            }

            const jobCard = `
                <div class="job-listing-card border p-3 mb-3 rounded shadow-sm bg-white">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="d-flex">
                            <div class="company-logo bg-primary bg-opacity-10 rounded-3 p-3 me-3">
                                <i class="bi bi-building text-primary fs-4"></i>
                            </div>
                            <div>
                                <h5 class="mb-1 fw-semibold">
                                    <a href="job-details.html?id=${job.id}" class="text-decoration-none text-dark">${job.title}</a>
                                </h5>
                                <p class="text-muted mb-2">${job.companyName || 'Verified Employer'}</p>
                                <div class="d-flex flex-wrap gap-2 mb-3">
                                    <span class="badge bg-light text-dark"><i class="bi bi-geo-alt me-1"></i>${job.location}</span>
                                    <span class="badge bg-light text-dark"><i class="bi bi-clock me-1"></i>${job.jobType}</span>
                                    <span class="badge bg-success bg-opacity-10 text-success">$${job.salary.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                        <small class="text-muted"><i class="bi bi-clock me-1"></i>${dateDisplay}</small>
                        <div class="d-flex gap-2">
                            <a href="job-details.html?id=${job.id}" class="btn btn-outline-primary btn-sm px-3">Details</a>
                            <button class="btn btn-primary btn-sm px-3" onclick="handleApplyClick(${job.id})">Apply</button>
                        </div>
                    </div>
                </div>`;
            jobContainer.insertAdjacentHTML('beforeend', jobCard);
        });

        document.getElementById('jobCount').textContent = filteredJobs.length;
    }

    function renderPagination() {
        const paginationElement = document.getElementById('pagination');
        paginationElement.innerHTML = '';
        const totalPages = Math.ceil(filteredJobs.length / jobsPerPage);

        if (totalPages <= 1) return; // පේජ් එකයි නම් Pagination ඕනේ නෑ

        for (let i = 1; i <= totalPages; i++) {
            const li = document.createElement('li');
            li.className = `page-item ${i === currentPage ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#">${i}</a>`;
            li.onclick = (e) => {
                e.preventDefault();
                displayPage(i);
                renderPagination();
                window.scrollTo(0, 0);
            };
            paginationElement.appendChild(li);
        }
    }

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = Math.floor(seconds / 86400);
        if (interval >= 1) return interval + "d ago";
        interval = Math.floor(seconds / 3600);
        if (interval >= 1) return interval + "h ago";
        interval = Math.floor(seconds / 60);
        if (interval >= 1) return interval + "m ago";
        return "Just now";
    }
</script>
