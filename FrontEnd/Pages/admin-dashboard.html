<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control Center | JobHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-blue: #0d6efd; --dark-navy: #1e293b; --light-bg: #f1f5f9; }
        body { background-color: var(--light-bg); font-family: 'Inter', sans-serif; color: var(--dark-navy); }

        .sidebar { background: white; border-right: 1px solid #e2e8f0; min-height: 100vh; padding: 20px; }
        .nav-link { color: #64748b; font-weight: 500; border-radius: 10px; padding: 12px; margin-bottom: 5px; }
        .nav-link.active { background: var(--primary-blue); color: white; }
        .nav-link:hover:not(.active) { background: #f8fafc; color: var(--primary-blue); }

        .stat-card { background: white; border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; }
        .main-content { padding: 40px; }
        .card-table { background: white; border-radius: 16px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        .chart-container { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: 300px; }
        .badge-status { border-radius: 50px; padding: 5px 12px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block fixed-top">
            <h4 class="fw-bold text-primary mb-5"><i class="bi bi-shield-lock-fill me-2"></i>JobHub Admin</h4>
            <nav class="nav flex-column">
                <a class="nav-link active" href="#" onclick="showSection('overview')"><i class="bi bi-grid-1x2-fill me-2"></i> Overview</a>
                <a class="nav-link" href="#" onclick="showSection('jobs')"><i class="bi bi-briefcase me-2"></i> Manage Jobs</a>
                <a class="nav-link" href="#" onclick="showSection('users')"><i class="bi bi-people me-2"></i> All Users</a>
                <a class="nav-link" href="#" onclick="showSection('companies')"><i class="bi bi-building me-2"></i> Companies</a>
                <hr>
                <a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
            </nav>
        </div>

        <div class="col-md-10 offset-md-2 main-content">

            <section id="overview-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">System Dashboard</h3>
                    <span class="text-muted" id="currentDate"></span>
                </div>

                <div class="row g-4 mb-5">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="text-muted small">Total Applications</div>
                            <h2 class="fw-bold mt-2" id="statApps">1,284</h2>
                            <div class="text-success small"><i class="bi bi-arrow-up"></i> 12% increase</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="text-muted small">Active Seekers</div>
                            <h2 class="fw-bold mt-2" id="statSeekers">856</h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="text-muted small">Total Employers</div>
                            <h2 class="fw-bold mt-2" id="statEmployers">124</h2>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="text-muted small">Live Jobs</div>
                            <h2 class="fw-bold mt-2" id="statJobs">432</h2>
                        </div>
                    </div>
                </div>

                <div class="row mb-5">
                    <div class="col-md-8">
                        <div class="chart-container">
                            <canvas id="growthChart"></canvas>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="chart-container text-center">
                            <h6 class="fw-bold">Job Categories Distribution</h6>
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <section id="jobs-section" style="display:none;">
                <h3 class="fw-bold mb-4">Manage All Job Posts</h3>
                <div class="card-table p-0">
                    <table class="table align-middle mb-0">
                        <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Job Title</th>
                            <th>Company</th>
                            <th>Status</th>
                            <th class="text-end pe-4">Action</th>
                        </tr>
                        </thead>
                        <tbody id="adminJobsTable">
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const API_BASE_URL = "http://localhost:8080/api";
    const token = localStorage.getItem('token');

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('currentDate').textContent = new Date().toDateString();
        initCharts();
        fetchAllJobs();
    });

    function showSection(section) {
        document.getElementById('overview-section').style.display = section === 'overview' ? 'block' : 'none';
        document.getElementById('jobs-section').style.display = section === 'jobs' ? 'block' : 'none';

        // Active link class change
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(section === 'jobs') fetchAllJobs();
    }

    function initCharts() {
        // Growth Chart (Line)
        const ctxGrowth = document.getElementById('growthChart').getContext('2d');
        new Chart(ctxGrowth, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'New Users',
                    data: [65, 59, 80, 81, 56, 120],
                    borderColor: '#0d6efd',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(13, 110, 253, 0.05)'
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Category Chart (Doughnut)
        const ctxCat = document.getElementById('categoryChart').getContext('2d');
        new Chart(ctxCat, {
            type: 'doughnut',
            data: {
                labels: ['IT', 'Design', 'Marketing', 'Sales'],
                datasets: [{
                    data: [45, 25, 15, 15],
                    backgroundColor: ['#0d6efd', '#20c997', '#ffc107', '#fd7e14']
                }]
            },
            options: { maintainAspectRatio: false, cutout: '70%' }
        });
    }

    async function fetchAllJobs() {
        try {
            const res = await fetch(`${API_BASE_URL}/jobs/all`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const jobs = await res.json();
            const table = document.getElementById('adminJobsTable');
            table.innerHTML = jobs.map(job => `
                <tr>
                    <td class="ps-4 fw-bold">${job.title}</td>
                    <td>${job.companyName || 'Unknown'}</td>
                    <td><span class="badge bg-success bg-opacity-10 text-success badge-status">Live</span></td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-light text-danger" onclick="deleteJob(${job.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (err) { console.error(err); }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    async function deleteJob(id) {
        const result = await Swal.fire({
            title: 'Delete this job?',
            text: "This action cannot be undone!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'Yes, delete it!'
        });

        if (result.isConfirmed) {
            // Delete API Call
            Swal.fire('Deleted!', 'Job has been removed.', 'success');
        }
    }
</script>
</body>
</html>
